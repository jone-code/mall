spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13306}/mall?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:1}
      timeout: 3s

server:
  port: 8102
  servlet:
    context-path: /

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

mall:
  jwt:
    admin-secret: ${MALL_ADMIN_JWT_SECRET:dev_admin_secret_please_change_32bytes_long_random}
    issuer: comonon-admin
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 86400
  admin:
    login:
      max-fail: 5
      fail-window-seconds: 600
      lock-seconds: 1800
    captcha:
      ttl-seconds: 300
      length: 4
    challenge:
      ttl-seconds: 300
      sms-length: 6
    password:
      min-length: 10
      history-keep: 5
      bcrypt-cost: 12
  services:
    product: ${PRODUCT_SERVICE_URL:http://localhost:8103}
    order: ${ORDER_SERVICE_URL:http://localhost:8105}
    review: ${REVIEW_SERVICE_URL:http://localhost:8109}
  upload:
    dir: ${MALL_UPLOAD_DIR:./data/uploads}
    public-prefix: /files

logging:
  level:
    com.comonon.mall.admin: INFO
